<div class="feed-header">
  <div class="tabs">
    <button class="tab-btn" [class.active]="activeTab === 'all'" (click)="setTab('all')">
      My Capsules
    </button>
    <button class="tab-btn" [class.active]="activeTab === 'received'" (click)="setTab('received')">
      Received
    </button>
    <button class="tab-btn" [class.active]="activeTab === 'sent'" (click)="setTab('sent')">
      Sent
    </button>
  </div>

  <a routerLink="/capsules/create" class="btn btn-primary new-capsule-btn">+ New Capsule</a>
</div>
